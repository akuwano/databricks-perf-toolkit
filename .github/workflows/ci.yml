name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  UV_DEFAULT_INDEX: https://pypi.org/simple

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install ruff
        run: uv tool install ruff

      - name: Run ruff check
        run: ruff check dabs/app/

      - name: Run ruff format check
        run: ruff format --check dabs/app/

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Build package
        run: uv build

      - name: Verify wheel
        run: |
          ls -la dist/
          uv pip install dist/*.whl --dry-run

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra web --group lint

      - name: Run mypy
        run: cd dabs/app && uv run mypy core/

  validate:
    name: Validate Key Mapping
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Validate key_mapping.yaml
        run: uv run python scripts/validate_key_mapping.py --verbose

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra web --group test

      - name: Run pytest
        run: cd dabs/app && uv run pytest --tb=short

  # Aggregated "everything green" status check — one single check
  # the UI can surface for reviewers, and an obvious target once
  # branch protection (or a future Pro/Public move) lets us mark
  # it required.
  ci-success:
    name: CI
    runs-on: ubuntu-latest
    needs: [lint, build, typecheck, validate, test]
    if: always()
    steps:
      - name: Verify all required jobs passed
        run: |
          # `needs.*.result` is one of: success, failure, cancelled, skipped
          results='${{ toJSON(needs) }}'
          echo "Dependency results: $results"
          echo "$results" | python3 -c '
          import json, sys
          data = json.load(sys.stdin)
          failing = {k: v["result"] for k, v in data.items() if v["result"] != "success"}
          if failing:
              print(f"❌ Jobs not green: {failing}")
              sys.exit(1)
          print("✅ All CI jobs passed")
          '
