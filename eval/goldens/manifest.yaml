# V6 Goldenset Manifest
# See README.md for schema details.
# Day 2: 5 seed cases. Day 3 will expand to 15-20.

version: 1
created: 2026-04-25
description: V6 quality evaluation goldenset

# Tag taxonomy (Q5 failure taxonomy の前段)
tags:
  - spill         # ディスクスピル / メモリ圧迫
  - shuffle       # シャッフル過多 / 偏り
  - photon        # Photon 化阻害 / fallback
  - scan          # スキャン非効率 / プルーニング不足
  - cache         # キャッシュ低ヒット / cold start
  - skew          # データ偏り
  - federation    # Lakehouse Federation
  - streaming     # DLT / SDP ストリーミング
  - small_query   # 短時間クエリ / overhead 支配
  - etl           # MERGE / INSERT 中心

# Workload type taxonomy
workload_types:
  - scan_heavy
  - join_heavy
  - etl
  - streaming
  - short_query
  - federation

cases:
  # --- Day 2 seed (5件) ---
  - case_id: spill_heavy_q1
    file: cases/spill_heavy.yaml
    tags: [spill, memory]
    priority: critical
    workload_type: join_heavy

  - case_id: shuffle_dominant_q1
    file: cases/shuffle_dominant.yaml
    tags: [shuffle, skew]
    priority: high
    workload_type: join_heavy

  - case_id: photon_blocker_q1
    file: cases/photon_blocker.yaml
    tags: [photon]
    priority: high
    workload_type: etl

  - case_id: scan_low_pruning_q1
    file: cases/scan_low_pruning.yaml
    tags: [scan]
    priority: high
    workload_type: scan_heavy

  - case_id: cache_cold_start_q1
    file: cases/cache_cold_start.yaml
    tags: [cache]
    priority: medium
    workload_type: scan_heavy

  # --- Day 3 expansion (10件) ---
