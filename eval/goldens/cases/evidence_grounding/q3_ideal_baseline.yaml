case_id: q3_ideal_baseline_q1
profile_path: json/physical_table_good_perf_query_profile.json
description: "良好なクエリで finding がない or 全 finding が grounded evidence のみ — Q3 composite が 1.0 に近い理想 baseline (W3.5 #4 Codex 推奨 positive case)。"
domain: dbsql
