notes: |
  W3.5 #4: positive baseline case。
  「問題ないクエリに対して、合成 evidence で問題を捏造しない」
  「数値予測を出さない」「source taxonomy を守る」を一括で確認。
  Week 4 で LLM canonical-direct + recommendation_no_force_fill が
  on になれば、この case の Q3 composite が ≥ 0.85 で安定するはず。
