{% extends "base.html" %}

{% block title %}{{ _('Error') }} - Performance Toolkit{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div style="max-width: 480px; width: 100%; padding: 0 0.75rem;">
        <div class="card">
            <div class="card-body text-center" style="padding: 3rem 2rem;">
                <i class="bi bi-exclamation-triangle" style="font-size: 3.5rem; color: hsl(var(--warning)); margin-bottom: 1.5rem; display: block;"></i>
                <h4 style="font-weight: 600; margin-bottom: 0.75rem;">{{ _('An error occurred') }}</h4>
                <p class="text-muted mb-4" style="font-size: 0.875rem;">{{ error }}</p>
                <a href="/" class="btn btn-primary">
                    <i class="bi bi-arrow-left"></i>
                    {{ _('Return to Home') }}
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
